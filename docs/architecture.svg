<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060809"/>
      <stop offset="100%" stop-color="#0a0c10"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00cc6a" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="url(#bg)"/>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" fill="#f0f0f3" font-size="22" font-weight="700">KisanSat — Multi-Agent Pipeline Architecture</text>
  <text x="500" y="68" text-anchor="middle" fill="#8b8b94" font-size="12">LangGraph Orchestrated | Parallel Execution | 6 Agents | Real-Time NASA Data</text>

  <!-- User Input -->
  <rect x="400" y="90" width="200" height="45" rx="8" fill="#111318" stroke="#00ff88" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="500" y="110" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="600">USER INPUT</text>
  <text x="500" y="125" text-anchor="middle" fill="#8b8b94" font-size="9">Location + Crop + Province</text>

  <!-- Arrow: User → Supervisor -->
  <line x1="500" y1="135" x2="500" y2="160" stroke="#00ff88" stroke-opacity="0.4" stroke-width="1.5"/>
  <polygon points="495,158 505,158 500,165" fill="#00ff88" fill-opacity="0.5"/>

  <!-- SUPERVISOR -->
  <rect x="375" y="165" width="250" height="55" rx="10" fill="url(#purple)" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="395" cy="192" r="8" fill="#8b5cf6" fill-opacity="0.3"/>
  <text x="395" y="196" text-anchor="middle" fill="#8b5cf6" font-size="10">🧠</text>
  <text x="415" y="186" fill="#f0f0f3" font-size="13" font-weight="600">Supervisor Agent</text>
  <text x="415" y="202" fill="#8b8b94" font-size="9">Validates input • Detects Rabi/Kharif season</text>
  <text x="415" y="214" fill="#8b8b94" font-size="9">Dispatches parallel waves • Error recovery</text>

  <!-- WAVE 1 Label -->
  <text x="500" y="248" text-anchor="middle" fill="#3b82f6" font-size="9" font-weight="600" letter-spacing="3">WAVE 1 — PARALLEL</text>

  <!-- Arrows: Supervisor → Wave 1 (fan out) -->
  <line x1="420" y1="220" x2="170" y2="270" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="500" y1="220" x2="500" y2="270" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="580" y1="220" x2="830" y2="270" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>

  <!-- WEATHER AGENT -->
  <rect x="60" y="270" width="220" height="75" rx="10" fill="url(#blue)" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="80" y="293" fill="#3b82f6" font-size="11">🌤️</text>
  <text x="100" y="293" fill="#f0f0f3" font-size="12" font-weight="600">Weather Agent</text>
  <text x="80" y="310" fill="#8b8b94" font-size="9">NASA POWER API (no key)</text>
  <text x="80" y="323" fill="#8b8b94" font-size="9">OpenWeatherMap (5-day forecast)</text>
  <text x="80" y="336" fill="#8b8b94" font-size="9">→ Temp, Humidity, Drought/Flood Risk</text>

  <!-- SOIL & CROP AGENT -->
  <rect x="390" y="270" width="220" height="75" rx="10" fill="url(#green)" stroke="#00ff88" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="410" y="293" fill="#00ff88" font-size="11">🌱</text>
  <text x="430" y="293" fill="#f0f0f3" font-size="12" font-weight="600">Soil & Crop Agent</text>
  <text x="410" y="310" fill="#8b8b94" font-size="9">Agromonitoring (NDVI + Soil)</text>
  <text x="410" y="323" fill="#8b8b94" font-size="9">Prithvi-EO-2.0 (crop classify)</text>
  <text x="410" y="336" fill="#8b8b94" font-size="9">→ Moisture, NDVI, Crop Recs</text>

  <!-- MARKET AGENT -->
  <rect x="720" y="270" width="220" height="75" rx="10" fill="url(#blue)" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="740" y="293" fill="#3b82f6" font-size="11">💰</text>
  <text x="760" y="293" fill="#f0f0f3" font-size="12" font-weight="600">Market Agent</text>
  <text x="740" y="310" fill="#8b8b94" font-size="9">API Ninjas (commodity prices)</text>
  <text x="740" y="323" fill="#8b8b94" font-size="9">Pakistan AMIS (mandi prices)</text>
  <text x="740" y="336" fill="#8b8b94" font-size="9">→ PKR Prices, Trend, Sell Timing</text>

  <!-- WAVE 2 Label -->
  <text x="500" y="378" text-anchor="middle" fill="#f5a623" font-size="9" font-weight="600" letter-spacing="3">WAVE 2 — DEPENDS ON WAVE 1</text>

  <!-- Arrows: Wave 1 → Pest -->
  <line x1="170" y1="345" x2="430" y2="395" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="500" y1="345" x2="500" y2="395" stroke="#00ff88" stroke-opacity="0.3" stroke-width="1"/>

  <!-- PEST & DISEASE AGENT -->
  <rect x="340" y="395" width="320" height="75" rx="10" fill="url(#gold)" stroke="#f5a623" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="360" y="418" fill="#f5a623" font-size="11">🐛</text>
  <text x="380" y="418" fill="#f0f0f3" font-size="12" font-weight="600">Pest & Disease Agent</text>
  <text x="360" y="435" fill="#8b8b94" font-size="9">XGBoost (pest risk from weather) • EfficientNet-B3 (disease detect)</text>
  <text x="360" y="448" fill="#8b8b94" font-size="9">FAO Locust Watch • Pakistan PARC/CDRI pest database</text>
  <text x="360" y="461" fill="#8b8b94" font-size="9">→ Risk Level, Pest Alerts, Prevention Actions, Locust Status</text>

  <!-- Arrow: Pest + Market → Advisory -->
  <line x1="500" y1="470" x2="500" y2="510" stroke="#f5a623" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="830" y1="345" x2="600" y2="510" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>

  <!-- FINAL Label -->
  <text x="500" y="505" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="600" letter-spacing="3">FINAL — SYNTHESIS</text>

  <!-- ADVISORY AGENT -->
  <rect x="300" y="515" width="400" height="75" rx="10" fill="url(#green)" stroke="#00ff88" stroke-opacity="0.5" stroke-width="2"/>
  <text x="320" y="538" fill="#00ff88" font-size="11">📋</text>
  <text x="340" y="538" fill="#f0f0f3" font-size="14" font-weight="700">Advisory Agent</text>
  <text x="320" y="555" fill="#8b8b94" font-size="9">Claude Sonnet 4 — synthesizes all 4 agent outputs into coherent advisory</text>
  <text x="320" y="568" fill="#8b8b94" font-size="9">English + Urdu (اردو) bilingual • Reasoning chain • Farm Score (1-100)</text>
  <text x="320" y="581" fill="#8b8b94" font-size="9">→ Action Plan, Risk Summary, Confidence Score, Data Sources List</text>

  <!-- Arrow: Advisory → Output -->
  <line x1="500" y1="590" x2="500" y2="620" stroke="#00ff88" stroke-opacity="0.5" stroke-width="1.5"/>
  <polygon points="495,618 505,618 500,625" fill="#00ff88" fill-opacity="0.6"/>

  <!-- OUTPUT -->
  <rect x="350" y="625" width="300" height="50" rx="10" fill="#111318" stroke="#00ff88" stroke-opacity="0.5" stroke-width="2" filter="url(#glow)"/>
  <circle cx="380" cy="650" r="5" fill="#00ff88">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="395" y="646" fill="#00ff88" font-size="12" font-weight="600">Bilingual Crop Advisory</text>
  <text x="395" y="662" fill="#8b8b94" font-size="9">EN + Urdu • Explainable • Actionable • Real-Time</text>

  <!-- Legend -->
  <rect x="30" y="640" width="12" height="12" rx="2" fill="#8b5cf6" fill-opacity="0.3" stroke="#8b5cf6" stroke-opacity="0.4"/>
  <text x="48" y="651" fill="#8b8b94" font-size="9">Orchestration</text>
  <rect x="130" y="640" width="12" height="12" rx="2" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-opacity="0.4"/>
  <text x="148" y="651" fill="#8b8b94" font-size="9">Data Agents</text>
  <rect x="220" y="640" width="12" height="12" rx="2" fill="#f5a623" fill-opacity="0.3" stroke="#f5a623" stroke-opacity="0.4"/>
  <text x="238" y="651" fill="#8b8b94" font-size="9">Analysis</text>
  <rect x="295" y="640" width="12" height="12" rx="2" fill="#00ff88" fill-opacity="0.3" stroke="#00ff88" stroke-opacity="0.4"/>
  <text x="313" y="651" fill="#8b8b94" font-size="9">Synthesis</text>
</svg>
